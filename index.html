<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Kerly Antonella</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const nombreCompleto = "KERLY ANTONELLA TINEO RODRIGUEZ"; 
        const particles = [];
        const gap = 6; // Distancia compacta entre letras (más pequeño, más denso)

        const maskCanvas = document.createElement('canvas');
        const maskCtx = maskCanvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        maskCanvas.width = canvas.width;
        maskCanvas.height = canvas.height;

        class Particle {
            constructor(targetX, targetY, char) {
                this.x = targetX;
                this.y = -Math.random() * canvas.height; 
                this.targetX = targetX;
                this.targetY = targetY;
                this.char = char;
                this.speed = Math.random() * 2 + 1; 
                this.friction = 0.95;
                this.reached = false;
                this.opacity = 0;
            }

            update() {
                if (!this.reached) {
                    if (this.y < this.targetY) {
                        this.y += this.speed;
                    } else {
                        this.y = this.targetY;
                        this.reached = true;
                    }
                }
                if (this.opacity < 1) this.opacity += 0.05;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 0, 0, ${this.opacity})`;
                ctx.font = "bold 10px Arial"; // Fuente pequeña y compacta
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function createMask() {
            maskCtx.fillStyle = 'white';
            maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);
            
            maskCtx.fillStyle = 'black';
            maskCtx.beginPath();
            
            const scale = Math.min(canvas.width, canvas.height) / 30;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                
                const drawX = centerX + x * scale;
                const drawY = centerY - y * scale;
                
                if (t === 0) {
                    maskCtx.moveTo(drawX, drawY);
                } else {
                    maskCtx.lineTo(drawX, drawY);
                }
            }
            maskCtx.closePath();
            maskCtx.fill(); 
        }

        function init() {
            createMask();
            const cleanName = nombreCompleto.replace(/\s+/g, ' ').trim();
            let charIndex = 0;
            const maskData = maskCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;

            for (let y = 0; y < canvas.height; y += gap) {
                for (let x = 0; x < canvas.width; x += gap) {
                    const index = (y * maskCanvas.width + x) * 4;
                    
                    if (maskData[index] === 0) {
                        const char = cleanName.charAt(charIndex % cleanName.length);
                        particles.push(new Particle(x, y, char));
                        charIndex++;
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            maskCanvas.width = canvas.width;
            maskCanvas.height = canvas.height;
            particles.length = 0;
            init();
        });
    </script>
</body>
</html>
