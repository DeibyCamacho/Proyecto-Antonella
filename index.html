<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Kerly Antonella</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const nombreCompleto = "KERLY ANTONELLA TINEO RODRIGUEZ"; 
        const particles = [];
        const particleCount = 3000; 
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x, y: -y };
        }

        class Particle {
            constructor(targetX, targetY, char) {
                this.x = Math.random() * canvas.width;
                this.y = -Math.random() * 1000; 
                this.targetX = targetX;
                this.targetY = targetY;
                this.char = char;
                this.speed = Math.random() * 2 + 0.8; 
                this.opacity = 0;
            }

            update() {
                if (this.y < this.targetY) {
                    this.y += this.speed;
                } else {
                    this.y = this.targetY;
                    this.x += (this.targetX - this.x) * 0.04;
                }

                if (this.opacity < 1) this.opacity += 0.02;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 0, 0, ${this.opacity})`;
                ctx.font = "bold 12px Arial";
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function init() {
            const scale = Math.min(canvas.width, canvas.height) / 45;
            const letters = nombreCompleto.replace(/\s/g, ''); 

            for (let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()); 
                
                const point = getHeartPoint(t);
                const char = letters.charAt(Math.floor(Math.random() * letters.length));
                
                const targetX = canvas.width / 2 + (point.x * scale * r);
                const targetY = canvas.height / 2 + (point.y * scale * r);
                
                particles.push(new Particle(targetX, targetY, char));
            }
        }

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles.length = 0;
            init();
        });
    </script>
</body>
</html>
