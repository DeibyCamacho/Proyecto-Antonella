<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Kerly Antonella</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nombre = "KERLY ANTONELLA TINEO RODRIGUEZ ";
        const particles = [];
        const gap = 8; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function isInsideHeart(x, y) {
            const scale = Math.min(canvas.width, canvas.height) / 40;
            const tx = (x - canvas.width / 2) / scale;
            const ty = (canvas.height / 2 - y) / scale;
            
            const formula = Math.pow(Math.pow(tx, 2) + Math.pow(ty, 2) - 1, 3) - Math.pow(tx, 2) * Math.pow(ty, 3);
            return formula <= 0;
        }

        class Particle {
            constructor(x, y, char) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = x;
                this.targetY = y;
                this.char = char;
                this.opacity = 0;
                this.friction = 0.92;
                this.ease = 0.05;
            }

            update() {
                this.x += (this.targetX - this.x) * this.ease;
                this.y += (this.targetY - this.y) * this.ease;
                if (this.opacity < 1) this.opacity += 0.01;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 0, 0, ${this.opacity})`;
                ctx.font = "bold 10px Arial";
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function init() {
            particles.length = 0;
            let charIndex = 0;
            for (let y = 0; y < canvas.height; y += gap) {
                for (let x = 0; x < canvas.width; x += gap) {
                    if (isInsideHeart(x, y)) {
                        const char = nombre[charIndex % nombre.length];
                        particles.push(new Particle(x, y, char));
                        charIndex++;
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
